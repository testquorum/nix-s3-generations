name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      # Configure the binary cache (substituter + signing key + post-build
      # hook) before any nix builds run. No closure has been published for
      # *this* commit yet (this run is what publishes it), so the action's
      # main phase 404s against R2 and falls back to building the binary
      # from the on-disk checkout. The later `nix-fast-build` and export
      # steps just reuse that already-built store path.
      - uses: ./
        with:
          bucket: testquorum-nix-public
          s3-endpoint: ba58a56742691d9efc310cca51093d04.r2.cloudflarestorage.com
          region: auto
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          public-key: "nixcache.testquorum.dev-1:aS+CJF8O8Ebirc6hypMfq/061h5TJlbsej1+zUJHPec="
          private-key: ${{ secrets.NIX_SIGNING_KEY }}

      - name: Nix fast build
        run: nix run .#nix-fast-build -- --no-nom

      - name: Export Nix closure archive
        run: |
          artifact=nix-s3-generations-closure-$(uname -m)-$(uname -s).closure.zst
          storepath=$(nix build --no-link --print-out-paths .)
          nix-store --export $(nix-store -qR "$storepath") | zstd -19 > "$artifact"

      - name: Upload closure to R2
        if: github.event_name == 'push'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          ref="${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
          aws s3 cp \
            nix-s3-generations-closure-$(uname -m)-$(uname -s).closure.zst \
            "s3://testquorum-assets/binaries/nix-s3-generations/${ref}/nix-s3-generations-closure-$(uname -m)-$(uname -s).closure.zst" \
            --endpoint-url https://ba58a56742691d9efc310cca51093d04.r2.cloudflarestorage.com
