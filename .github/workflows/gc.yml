name: GC

on:
  schedule:
    - cron: "17 7 * * 3"
  workflow_dispatch:

jobs:
  gc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            extra-substituters = https://nixcache.testquorum.dev
            extra-trusted-public-keys = nixcache.testquorum.dev-1:aS+CJF8O8Ebirc6hypMfq/061h5TJlbsej1+zUJHPec=

      - uses: ./gc
        with:
          bucket: testquorum-nix-public
          s3-endpoint: ba58a56742691d9efc310cca51093d04.r2.cloudflarestorage.com
          region: auto
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

          # Pessimistic — wider than any plausible push duration in this
          # repo, so a long-running build whose root JSON hasn't landed yet
          # can't be raced by the scheduled GC.
          freshness-buffer-secs: "7200"

          forget-before: "30d"
